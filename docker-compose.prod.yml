# RCA/docker-compose.prod.yml
services:
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./frontend/src:/usr/share/nginx/html:ro
      - certbot_data:/etc/letsencrypt:ro
      - nginx_cache:/var/cache/nginx        # <-- writable volume
    user: "1000:1000"                        # <-- non-root user
    networks:
      - frontend
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: production
    volumes:
      - ddm_uploads:/app/uploads
    env_file:
      - .env
    networks:
      - frontend
      - backend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      tika:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  postgres:
    image: postgres:16-alpine
    volumes:
      - ddm_postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - backend
    restart: unless-stopped
    read_only: false
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  redis:
    image: redis:7-alpine
    volumes:
      - ddm_redis_data:/data
    networks:
      - backend
    restart: unless-stopped
    read_only: false
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M

  meilisearch:
    image: getmeili/meilisearch:v1.6
    volumes:
      - ddm_meili_data:/meili_data
    env_file:
      - .env
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    networks:
      - backend
    restart: unless-stopped
    read_only: false
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 20s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  tika:
    build:
      context: ./docker/tika
      dockerfile: Dockerfile
    environment:
      - TIKA_OCR_ENABLED=${TIKA_OCR_ENABLED:-false}
    networks:
      - backend
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9998/tika"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:  
        limits:
          cpus: '0.3'
          memory: 256M

volumes:
  ddm_postgres_data:
  ddm_redis_data:
  ddm_meili_data:
  ddm_uploads:
  certbot_data:
  nginx_cache:                 # <-- new volume

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
# end of RCA/docker-compose.prod.yml