<!-- RCA/frontend/src/pages/ddm/dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDM - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-7xl mx-auto py-10 px-4">
        <h1 class="text-3xl font-bold text-gray-800 mb-4">DDM Dashboard</h1>
        <p class="text-gray-600 mb-6">You are logged in. Full dashboard coming in Phase 4–6.</p>
        <button id="logout-btn" class="bg-red-600 text-white py-2 px-4 rounded hover:bg-red-700">Logout</button>
    </div>

    <script type="module">
        document.getElementById("logout-btn").addEventListener("click", () => {
            document.cookie = "user_session=; Max-Age=0; path=/";
            window.location.href = "login.html";
        });
    </script>
</body>
</html>
<!-- end of RCA/frontend/src/pages/ddm/dashboard.html -->
