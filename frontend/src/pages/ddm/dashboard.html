<!-- RCA/frontend/src/pages/ddm/dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDM – Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Space+Grotesk:wght@400;500&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/tailwind.min.css">
    <link rel="stylesheet" href="/css/ddm-dashboard.css">
</head>
<body>
    <div id="page-transition-wrapper">
        <div id="toast-container"></div>
        <div id="error-banner" class="error-banner"></div>

        <div class="dashboard-header">
            <h1>DDM Dashboard</h1>
            <div class="header-controls">
                <div id="view-toggle" class="view-toggle">
                    <button data-view="grid" class="view-btn" title="Grid view">▦</button>
                    <button data-view="list" class="view-btn active" title="List view">☰</button>
                    <button data-view="category" class="view-btn" title="Category view">⊞</button>
                </div>
                <button id="logout-btn" class="btn btn-secondary logout-btn">Logout</button>
            </div>
        </div>

        <div class="container">
            <div id="announcements-container" class="announcements-section"></div>
            <div id="search-container" class="search-section"></div>
            <div id="file-list-container" class="file-list-section"></div>
        </div>
    </div>

    <script src="/js/theme.js"></script>
    <script src="/js/page-transition.js"></script>
    <script type="module" src="/js/ddm-dashboard.js"></script>
</body>
</html>
<!-- end of RCA/frontend/src/pages/ddm/dashboard.html -->
