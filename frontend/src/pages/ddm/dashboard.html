<!-- RCA/frontend/src/pages/ddm/dashboard.html v1.0.3 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDM - Dashboard</title>
    <link href="/css/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Toast container (required by showToast) -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <div id="error-banner" class="hidden bg-red-600 text-white p-3 text-center"></div>
    <div class="max-w-7xl mx-auto py-10 px-4">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">DDM Dashboard</h1>
            <button id="logout-btn" class="bg-red-600 text-white py-2 px-4 rounded hover:bg-red-700">Logout</button>
        </div>

        <div id="announcements-container" class="mb-6"></div>
        <div id="file-list-container" class="mb-6"></div>
    </div>

    <script type="module">
        console.log("✅ Dashboard v1.0.3 loaded");

        function showError(msg) {
            const banner = document.getElementById("error-banner");
            banner.textContent = msg;
            banner.classList.remove("hidden");
        }

        async function verifySession() {
            try {
                const res = await fetch('/api/ddm/auth/session', { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    if (data.user_id || data.role === 'user') {
                        return true;
                    }
                }
                window.location.href = '/pages/ddm/login.html';
                return false;
            } catch (e) {
                showError('Backend unreachable – redirecting to login');
                setTimeout(() => { window.location.href = '/pages/ddm/login.html'; }, 2000);
                return false;
            }
        }

        document.getElementById("logout-btn").addEventListener("click", () => {
            document.cookie = "user_session=; Max-Age=0; path=/";
            window.location.href = "/pages/ddm/login.html";
        });

        (async function init() {
            const authenticated = await verifySession();
            if (!authenticated) return;

            try {
                const { default: AnnouncementPanel } = await import("../../components/ddm/announcement-panel.js");
                new AnnouncementPanel("announcements-container");
            } catch (err) {
                console.warn("Announcements panel not available:", err);
            }

            try {
                const { FileList } = await import("../../components/ddm/file-list.js");
                new FileList("file-list-container");
            } catch (err) {
                document.getElementById("file-list-container").innerHTML =
                    `<p class="text-red-500">Failed to load file list: ${err.message}</p>`;
                console.error(err);
            }
        })();
    </script>
</body>
</html>
<!-- end of RCA/frontend/src/pages/ddm/dashboard.html -->
