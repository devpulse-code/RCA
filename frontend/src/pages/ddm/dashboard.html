<!-- RCA/frontend/src/pages/ddm/dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDM - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="max-w-6xl mx-auto p-6">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">DDM Dashboard</h1>
            <a href="/pages/ddm/login.html" class="text-blue-600 hover:underline">Logout</a>
        </header>
        <!-- Search Bar -->
        <div class="mb-6">
            <input type="text" placeholder="Search files..." class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <!-- File list container -->
        <div id="file-list-container" class="bg-white p-4 rounded shadow">
            Files will appear here.
        </div>
    </div>
    <script type="module">
        import { FileList } from "../../components/ddm/file-list.js";
        new FileList("file-list-container");
    </script>
</body>
</html>
<!-- end of RCA/frontend/src/pages/ddm/dashboard.html -->
