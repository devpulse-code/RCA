<!-- RCA/frontend/src/pages/ddm/admin-panel.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDM - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div id="error-banner" class="hidden bg-red-600 text-white p-3 text-center"></div>
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 text-white p-6">
            <h2 class="text-xl font-bold mb-6">Admin Panel</h2>
            <nav class="space-y-2" id="sidebar-nav">
                <a href="#users" class="block py-2 px-3 rounded hover:bg-gray-700" data-section="users">Users</a>
                <a href="#groups" class="block py-2 px-3 rounded hover:bg-gray-700" data-section="groups">Groups</a>
                <a href="#files" class="block py-2 px-3 rounded hover:bg-gray-700" data-section="files">Files</a>
                <a href="#upload-queue" class="block py-2 px-3 rounded hover:bg-gray-700" data-section="upload-queue">Upload Queue</a>
                <a href="#announcements" class="block py-2 px-3 rounded hover:bg-gray-700" data-section="announcements">Announcements</a>
                <a href="#audit-log" class="block py-2 px-3 rounded hover:bg-gray-700" data-section="audit-log">Audit Log</a>
                <a href="#settings" class="block py-2 px-3 rounded hover:bg-gray-700" data-section="settings">Settings</a>
                <button id="logout-btn" class="mt-4 w-full bg-red-600 py-2 px-3 rounded hover:bg-red-700">Logout</button>
            </nav>
        </aside>
        <!-- Main content -->
        <main class="flex-1 p-8">
            <h1 class="text-2xl font-bold mb-6" id="section-title">User Management</h1>
            <div id="section-content"></div>
        </main>
    </div>

    <script type="module">
        window.onerror = function(msg, url, line) {
            const banner = document.getElementById("error-banner");
            banner.textContent = `Module load error: ${msg} (${url}:${line})`;
            banner.classList.remove("hidden");
        };

        async function loadModules() {
            try {
                const { UserTable } = await import("../../components/ddm/admin/user-table.js");
                const { FileTable } = await import("../../components/ddm/admin/file-table.js");
                const { UploadQueue } = await import("../../components/ddm/admin/upload-queue.js");
                const { AnnouncementTable } = await import("../../components/ddm/admin/announcement-table.js");
                const AuditLogViewer = (await import("../../components/ddm/admin/audit-log-viewer.js")).default;
                const { SettingsPanel } = await import("../../components/ddm/admin/settings-panel.js");
                const { showToast } = await import("../../components/ui/toast.js");

                // Session verification
                async function verifySession() {
                    try {
                        const res = await fetch('/api/ddm/admin/users/', { credentials: 'include' });
                        if (!res.ok) throw new Error('Not authenticated');
                    } catch {
                        window.location.href = '/pages/ddm/admin-login.html';
                        return false;
                    }
                    return true;
                }

                const authenticated = await verifySession();
                if (!authenticated) return;

                // Tab loading
                const titleEl = document.getElementById("section-title");
                const contentEl = document.getElementById("section-content");
                const sectionTitles = {
                    users: "User Management", groups: "Group Management",
                    files: "File Management", "upload-queue": "Upload Request Queue",
                    announcements: "Announcement Management", "audit-log": "Audit Log",
                    settings: "System Settings"
                };

                function createComponent(section) {
                    switch (section) {
                        case "users": return new UserTable("section-content");
                        case "files": return new FileTable("section-content");
                        case "upload-queue": return new UploadQueue("section-content");
                        case "announcements": return new AnnouncementTable("section-content");
                        case "audit-log": return new AuditLogViewer("section-content");
                        case "settings": return new SettingsPanel("section-content");
                        case "groups": return {
                            render(container) {
                                container.innerHTML = `<p class="text-gray-500">Group management placeholder.</p>`;
                            }
                        };
                        default: return null;
                    }
                }

                function loadSection(section) {
                    document.querySelectorAll("[data-section]").forEach(link => {
                        link.classList.toggle("bg-gray-700", link.dataset.section === section);
                    });
                    titleEl.textContent = sectionTitles[section] || section;
                    contentEl.innerHTML = "";
                    const comp = createComponent(section);
                    if (comp && typeof comp.render === "function") {
                        comp.render(contentEl);
                    } else {
                        contentEl.innerHTML = `<p class="text-red-500">Component not available.</p>`;
                    }
                }

                document.querySelectorAll("[data-section]").forEach(link => {
                    link.addEventListener("click", (e) => {
                        e.preventDefault();
                        const section = link.dataset.section;
                        window.location.hash = section;
                        loadSection(section);
                    });
                });

                const initialSection = window.location.hash.replace("#", "") || "users";
                loadSection(initialSection);

                document.getElementById("logout-btn").addEventListener("click", () => {
                    document.cookie = "admin_session=; Max-Age=0; path=/";
                    window.location.href = "/pages/ddm/admin-login.html";
                });
            } catch (err) {
                const banner = document.getElementById("error-banner");
                banner.textContent = `Failed to load modules: ${err.message}`;
                banner.classList.remove("hidden");
                console.error(err);
            }
        }

        loadModules();
    </script>
</body>
</html>
<!-- end of RCA/frontend/src/pages/ddm/admin-panel.html -->
