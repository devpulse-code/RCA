<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDM - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 text-white p-6">
            <h2 class="text-xl font-bold mb-6">Admin Panel</h2>
            <nav class="space-y-2" id="sidebar-nav">
                <a href="#users" class="block py-2 px-3 rounded hover:bg-gray-700" data-section="users">Users</a>
                <a href="#groups" class="block py-2 px-3 rounded hover:bg-gray-700" data-section="groups">Groups</a>
                <a href="#files" class="block py-2 px-3 rounded hover:bg-gray-700" data-section="files">Files</a>
                <a href="#upload-queue" class="block py-2 px-3 rounded hover:bg-gray-700" data-section="upload-queue">Upload Queue</a>
                <a href="#announcements" class="block py-2 px-3 rounded hover:bg-gray-700" data-section="announcements">Announcements</a>
                <a href="#audit-log" class="block py-2 px-3 rounded hover:bg-gray-700" data-section="audit-log">Audit Log</a>
                <a href="#settings" class="block py-2 px-3 rounded hover:bg-gray-700" data-section="settings">Settings</a>
                <button id="logout-btn" class="mt-4 w-full bg-red-600 py-2 px-3 rounded hover:bg-red-700">Logout</button>
            </nav>
        </aside>
        <!-- Main content -->
        <main class="flex-1 p-8" id="main-content">
            <h1 class="text-2xl font-bold mb-6">User Management</h1>
            <div id="users-table-container"></div>
        </main>
    </div>
    <script type="module">
        import { UserTable } from "../../components/ddm/admin/user-table.js";
        import { FileTable } from "../../components/ddm/admin/file-table.js";
        import { UploadQueue } from "../../components/ddm/admin/upload-queue.js";
        import { AnnouncementTable } from "../../components/ddm/admin/announcement-table.js";
        import AuditLogViewer from "../../components/ddm/admin/audit-log-viewer.js";
        import { SettingsPanel } from "../../components/ddm/admin/settings-panel.js";
        import { showToast } from "../../components/ui/toast.js";

        const contentDiv = document.getElementById("main-content");
        let currentComponent = null;

        function loadSection(section) {
            // Clear main content
            contentDiv.innerHTML = "";
            if (section === "users") {
                contentDiv.innerHTML = `<h1 class="text-2xl font-bold mb-6">User Management</h1><div id="users-table-container"></div>`;
                currentComponent = new UserTable("users-table-container");
            } else if (section === "groups") {
                contentDiv.innerHTML = `<h1 class="text-2xl font-bold mb-6">Groups</h1><p>Group management coming soon.</p>`;
            } else if (section === "files") {
                contentDiv.innerHTML = `<h1 class="text-2xl font-bold mb-6">File Management</h1><div id="files-table-container"></div>`;
                currentComponent = new FileTable("files-table-container");
            } else if (section === "upload-queue") {
                contentDiv.innerHTML = `<h1 class="text-2xl font-bold mb-6">Upload Queue</h1><div id="upload-queue-container"></div>`;
                currentComponent = new UploadQueue("upload-queue-container");
            } else if (section === "announcements") {
                contentDiv.innerHTML = `<h1 class="text-2xl font-bold mb-6">Announcements</h1><div id="announcements-table-container"></div>`;
                currentComponent = new AnnouncementTable("announcements-table-container");
            } else if (section === "audit-log") {
                contentDiv.innerHTML = `<h1 class="text-2xl font-bold mb-6">Audit Log</h1><div id="audit-log-container"></div>`;
                currentComponent = new AuditLogViewer("audit-log-container");
            } else if (section === "settings") {
                contentDiv.innerHTML = `<h1 class="text-2xl font-bold mb-6">Settings</h1><div id="settings-container"></div>`;
                currentComponent = new SettingsPanel("settings-container");
            }
        }

        document.querySelectorAll("[data-section]").forEach(link => {
            link.addEventListener("click", (e) => {
                e.preventDefault();
                const section = link.dataset.section;
                window.location.hash = section;
                loadSection(section);
            });
        });

        const initial = window.location.hash.replace("#", "") || "users";
        loadSection(initial);

        document.getElementById("logout-btn").addEventListener("click", () => {
            document.cookie = "admin_session=; Max-Age=0; path=/";
            window.location.href = "/pages/ddm/admin-login.html";
        });
    </script>
</body>
</html>
<!-- end of RCA/frontend/src/pages/ddm/admin-panel.html -->
