<!-- RCA/frontend/src/pages/ddm/admin-panel.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDM – Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Space+Grotesk:wght@400;500&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/tailwind.min.css">
    <link rel="stylesheet" href="/css/ddm-admin-panel.css">
</head>
<body>
    <div id="page-transition-wrapper">
        <div id="error-banner" class="error-banner"></div>

        <!-- Top header bar -->
        <header class="admin-header">
            <button id="theme-toggle" class="theme-toggle-btn header-theme-toggle" type="button"></button>
            <button id="logout-btn" class="btn btn-danger">Logout</button>
        </header>

        <!-- Main layout: sidebar + content -->
        <div class="admin-body">
            <aside class="sidebar">
                <h2>Admin Panel</h2>
                <nav>
                    <a href="#users" data-section="users">Users</a>
                    <a href="#groups" data-section="groups">Groups</a>
                    <a href="#files" data-section="files">Files</a>
                    <a href="#upload-queue" data-section="upload-queue">Upload Queue</a>
                    <a href="#announcements" data-section="announcements">Announcements</a>
                    <a href="#audit-log" data-section="audit-log">Audit Log</a>
                    <a href="#settings" data-section="settings">Settings</a>
                </nav>
            </aside>

            <main class="main-content">
                <h1 id="section-title">Loading...</h1>
                <div id="section-content"></div>
            </main>
        </div>
    </div>

    <script src="/js/theme.js"></script>
    <script src="/js/page-transition.js"></script>
    <script type="module" src="/js/ddm-admin-panel.js"></script>
</body>
</html>
<!-- end of RCA/frontend/src/pages/ddm/admin-panel.html -->
