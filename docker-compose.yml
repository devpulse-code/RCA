services:
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./frontend/src:/usr/share/nginx/html:ro
      - certbot_data:/etc/letsencrypt:ro
    networks:
      - ddm_network
    restart: unless-stopped
    # read_only: true   # removed to allow config modification
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: development
    volumes:
      - ./backend/src:/app/backend/src
      - ddm_uploads:/app/uploads
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks:
      - ddm_network
    read_only: false
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    volumes:
      - ddm_postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - ddm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - ddm_redis_data:/data
    networks:
      - ddm_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.6
    volumes:
      - ddm_meili_data:/meili_data
    env_file:
      - .env
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: development
    networks:
      - ddm_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  tika:
    build:
      context: ./docker/tika
      dockerfile: Dockerfile
    networks:
      - ddm_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9998/tika"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ddm_postgres_data:
  ddm_redis_data:
  ddm_meili_data:
  ddm_uploads:
  certbot_data:
  nginx_cache:

networks:
  ddm_network:
    driver: bridge
# end of RCA/docker-compose.yml