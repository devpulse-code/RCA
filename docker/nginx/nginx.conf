# RCA/docker/nginx/nginx.conf
worker_processes auto;
pid /var/cache/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Writable temp paths – all under the volume mount
    client_body_temp_path /var/cache/nginx/client_body;
    proxy_temp_path       /var/cache/nginx/proxy_temp;
    fastcgi_temp_path     /var/cache/nginx/fastcgi_temp;
    uwsgi_temp_path       /var/cache/nginx/uwsgi_temp;
    scgi_temp_path        /var/cache/nginx/scgi_temp;

    # Logs also under the writable volume
    access_log /var/cache/nginx/access.log;
    error_log  /var/cache/nginx/error.log;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    include /etc/nginx/conf.d/*.conf;
}
# end of RCA/docker/nginx/nginx.conf