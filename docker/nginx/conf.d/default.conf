# RCA/docker/nginx/conf.d/default.conf

# Docker's embedded DNS resolver
resolver 127.0.0.11 valid=30s;

# HTTP server (development without HTTPS)
server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    client_max_body_size 500m;
    root /usr/share/nginx/html;
    index splash.html;

    # Explicitly set correct MIME type for JavaScript modules
    location ~ \.js$ {
        default_type application/javascript;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public";
    }

    # Serve other static assets
    location ~* \.(css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public";
    }

    # Diagnostic: log any request to /components/ or /services/
    location ~ ^/(components|services)/ {
        try_files $uri =404;
    }

    # General requests – no SPA fallback
    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy API to backend
    location /api/ {
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream;   # <-- no trailing path
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /docs {
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream;   # <-- no trailing path
        proxy_set_header Host $host;
    }

    location /openapi.json {
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream;   # <-- no trailing path
        proxy_set_header Host $host;
    }
}
# end of RCA/docker/nginx/conf.d/default.conf