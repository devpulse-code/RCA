# RCA/docker/nginx/conf.d/default.conf
# HTTP → HTTPS redirect for production (stripped for dev, but we'll keep server blocks)
server {
    listen 80;
    server_name localhost;

    # Redirect all HTTP to HTTPS (comment out for dev if no certificate)
    # return 301 https://$host$request_uri;

    # For development without HTTPS, we serve directly
    # Increase max upload size for admin uploads (500 MB)
    client_max_body_size 500m;

    # Serve static frontend
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Proxy Swagger docs
    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
        proxy_set_header Host $host;
    }
}

