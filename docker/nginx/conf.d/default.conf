# RCA/docker/nginx/conf.d/default.conf
# HTTP server (development without HTTPS)
server {
    listen 80;
    server_name localhost;

    client_max_body_size 500m;
    root /usr/share/nginx/html;
    index index.html;

    # Explicitly set correct MIME type for JavaScript modules
    # (safety net even though mime.types should already cover it)
    location ~ \.js$ {
        default_type application/javascript;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public";
    }

    # Serve other static assets
    location ~* \.(css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public";
    }

    # Diagnostic: log any request to /components/ or /services/ that reaches here
    location ~ ^/(components|services)/ {
        try_files $uri =404;
        # If you want to debug, temporarily add:
        # add_header X-Debug-Path $uri;
    }

    # Main SPA fallback (only for non-asset paths)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
        proxy_set_header Host $host;
    }
}
# end of RCA/docker/nginx/conf.d/default.conf